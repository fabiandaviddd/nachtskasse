<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14110F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nachtkasse</title>
<style>
  :root{
    --bg:#14110F; --surface:#1E1A17; --surface2:#26211D; --line:#332C26;
    --ink:#F2EBE2; --muted:#8E857B; --faint:#5C554D;
    --ok:#7FB069; --warn:#E6A756; --over:#E4572E; --goal:#6BA8C4;
    --num:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;
    --txt:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:var(--txt);
    padding:calc(14px + env(safe-area-inset-top)) 0 calc(30px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;min-height:100vh}
  header{display:flex;justify-content:space-between;align-items:baseline;padding:8px 20px 4px}
  .brand{font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stand{font-family:var(--num);font-size:.72rem;color:var(--faint)}
  .hero{padding:14px 20px 20px}
  .hero-label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .hero-num{font-family:var(--num);font-size:3.4rem;line-height:1;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .hero-num small{font-size:1.6rem;font-weight:500;color:var(--muted)}
  .hero-sub{margin-top:9px;font-size:.85rem;color:var(--muted)}
  .hero-daily{margin-top:4px;font-size:.78rem;color:var(--faint);font-family:var(--num)}
  .hero-num.ok{color:var(--ok)} .hero-num.warn{color:var(--warn)} .hero-num.over{color:var(--over)}
  .perf{height:14px;margin:0 20px;position:relative;overflow:hidden}
  .perf::before{content:"";position:absolute;inset:6px 0 auto 0;border-top:2px dashed var(--line)}
  .sect{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);padding:12px 20px 2px}
  .rows{padding:8px 12px 0}
  .row{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 14px 12px;margin:0 0 10px}
  .row.watch{opacity:.82}
  .row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .row-name{font-size:.95rem;font-weight:600}
  .row-name span{font-size:.66rem;color:var(--faint);font-weight:500;letter-spacing:.08em;margin-left:6px}
  .row-nums{font-family:var(--num);font-size:.85rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .row-nums b{color:var(--ink);font-weight:600}
  .bar{height:10px;border-radius:5px;background:var(--surface2);overflow:hidden}
  .fill{height:100%;border-radius:5px;background:var(--ok);width:0;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .fill.warn{background:var(--warn)} .fill.over{background:var(--over)} .fill.goal{background:var(--goal)}
  .row-foot{display:flex;justify-content:space-between;margin-top:7px;font-size:.72rem;color:var(--faint);font-family:var(--num)}
  .st-over{color:var(--over);font-weight:700} .st-warn{color:var(--warn)} .st-ok{color:var(--ok);font-weight:700}
  .note{text-align:center;font-size:.72rem;color:var(--faint);padding:18px 30px 0;line-height:1.5}
  .err{margin:40px 20px;text-align:center;color:var(--muted);font-size:.9rem;line-height:1.6}
  .cd{margin:10px 12px 0;border-radius:12px;padding:10px 14px;font-size:.8rem;text-align:center;
    transition:background .8s,border-color .8s,color .8s;
    background:rgba(127,176,105,.10);border:1px solid var(--ok);color:var(--ok)}
  .cd b{font-family:var(--num);font-variant-numeric:tabular-nums;font-size:.95rem;color:inherit}
  .cd.warn{background:rgba(230,167,86,.10);border-color:var(--warn);color:var(--warn)}
  .cd.over{background:rgba(228,87,46,.10);border-color:var(--over);color:var(--over)}
  .cd.due{background:rgba(228,87,46,.16);border-color:var(--over);color:var(--over)}
  @media(prefers-reduced-motion:reduce){.fill{transition:none}}
</style>
</head>
<body>
<header>
  <div class="brand">Nachtkasse</div>
  <div class="stand" id="stand"></div>
</header>
<div id="app"><div class="err">Lade Budgets…</div></div>

<script>
const fmt=n=>Math.round(n).toLocaleString('de-DE');

function budgetRow(b){
  const pct=Math.min(b.spent/b.limit*100,100), over=b.spent>b.limit, warn=!over&&b.spent>b.limit*0.8;
  return '<div class="row '+(b.hero===false?'watch':'')+'">'
    +'<div class="row-top"><div class="row-name">'+b.name
    +(b.hero===false?'<span>NUR BEOBACHTEN</span>':'')+'</div>'
    +'<div class="row-nums"><b>'+fmt(b.spent)+'</b> / '+fmt(b.limit)+' €</div></div>'
    +'<div class="bar"><div class="fill '+(over?'over':warn?'warn':'')+'" style="width:'+pct+'%"></div></div>'
    +'<div class="row-foot"><span class="'+(over?'st-over':warn?'st-warn':'')+'">'
    +(over?('+'+fmt(b.spent-b.limit)+' € drüber'):(fmt(b.limit-b.spent)+' € frei'))
    +'</span><span>'+Math.round(b.spent/b.limit*100)+'%</span></div></div>';
}

function goalRow(g){
  const done=Math.max(g.done,0);
  const pct=Math.min(done/g.target*100,100);
  const reached=g.done>=g.target, half=g.done>=g.target*0.5;
  const cls=reached?'ok':(half?'goal':'over');
  const foot=g.done<0
    ? '<span class="st-over">'+fmt(-g.done)+' € entnommen</span>'
    : (reached?'<span class="st-ok">Ziel erreicht</span>'
      :'<span class="'+(half?'':'st-over')+'">noch '+fmt(g.target-g.done)+' € bis Ziel</span>');
  return '<div class="row"><div class="row-top">'
    +'<div class="row-name">'+g.name+'</div>'
    +'<div class="row-nums"><b>'+fmt(g.done)+'</b> / '+fmt(g.target)+' €</div></div>'
    +'<div class="bar"><div class="fill '+cls+'" style="width:'+pct+'%"></div></div>'
    +'<div class="row-foot">'+foot+'<span>'+Math.round(g.done/g.target*100)+'%</span></div></div>';
}

function render(D){
  const hb=D.budgets.filter(function(b){return b.hero!==false;});
  const total=hb.reduce(function(a,b){return a+b.limit;},0);
  const spent=hb.reduce(function(a,b){return a+b.spent;},0);
  const remain=total-spent;
  const cls=remain<0?'over':(spent>total*0.85?'warn':'ok');
  document.getElementById('stand').textContent='Stand '+D.through;

  const konto=(D.wealth&&typeof D.wealth.current==='number')?D.wealth.current:null;
  const p=D.through.split('.'), thruDay=+p[0], mon=+p[1], yr=+p[2];
  const dim=new Date(yr,mon,0).getDate();
  const daysLeft=Math.max(dim-thruDay,0);
  const rb=D.budgets.filter(function(b){return b.id==='rest';})[0];
  const rLeft=rb?rb.limit-rb.spent:0;
  let daily=(rb&&daysLeft>0)
    ?'<div class="hero-daily">≈ '+(rLeft<0?'0':fmt(rLeft/daysLeft))+' €/Tag für „Rest" · '+daysLeft+' Tage bis Monatsende</div>':'';

  var debt='';
  if(D.debt){
    var db=D.debt, dpct=Math.min(db.paid/db.total*100,100);
    var rest=db.total-db.paid;
    debt='<div class="perf"></div><div class="sect">Langfristig</div>'
      +'<section class="rows"><div class="row"><div class="row-top">'
      +'<div class="row-name">'+db.name+'</div>'
      +'<div class="row-nums"><b>'+fmt(db.paid)+'</b> / '+fmt(db.total)+' €</div></div>'
      +'<div class="bar"><div class="fill goal" style="width:'+dpct+'%"></div></div>'
      +'<div class="row-foot"><span>noch '+fmt(rest)+' € offen'
      +(db.rate&&db.paid<db.total?' · bei '+fmt(db.rate)+' €/Mt ≈ '+Math.ceil(rest/db.rate)+' Monate':'')
      +'</span><span>'+Math.round(db.paid/db.total*100)+'%</span></div></div></section>';
  }
  var wealth='';
  if(D.wealth){
    var w=D.wealth, delta=w.current-w.baseline;
    var dcls=delta>=0?'st-ok':'st-over';
    wealth='<div class="perf"></div><div class="sect">Vermögen · Start '+w.since+'</div>'
      +'<section class="rows"><div class="row"><div class="row-top">'
      +'<div class="row-name">Konto + TR seit Start</div>'
      +'<div class="row-nums"><b>'+fmt(w.current)+'</b> €</div></div>'
      +'<div class="row-foot"><span class="'+dcls+'">'+(delta>=0?'+':'−')+fmt(Math.abs(delta))+' € seit Start</span>'
      +'<span>Ziel +'+fmt(w.pace)+' €/Monat</span></div></div></section>';
  }
  var stale=D.updatedAt?'<div class="cd" id="cd"></div>':'';
  const capped=(konto!==null&&konto<remain&&remain>0);
  const avail=capped?konto:remain;
  const heroLabel=capped?(D.month+' · verfügbar (Konto begrenzt)'):(D.month+' · noch im Budget');
  const heroCls=capped?(konto<50?'over':'warn'):cls;
  const heroSub=capped
    ?('Budget hätte noch '+fmt(remain)+' € frei · Konto deckt '+fmt(konto)+' €')
    :(fmt(spent)+' € von '+fmt(total)+' € ausgegeben');
  if(capped&&daysLeft>0){
    daily='<div class="hero-daily">≈ '+fmt(avail/daysLeft)+' €/Tag bis Monatsende — bis Geld reinkommt</div>';
  }
  document.getElementById('app').innerHTML=
    stale
    +'<section class="hero"><div class="hero-label">'+heroLabel+'</div>'
    +'<div class="hero-num '+heroCls+'">'+(avail<0?'−'+fmt(-avail):fmt(avail))+'<small> €</small></div>'
    +'<div class="hero-sub">'+heroSub+'</div>'+daily+'</section>'
    +'<div class="perf"></div>'
    +'<section class="rows">'+D.budgets.map(budgetRow).join('')+'</section>'
    +((D.goals&&D.goals.length)
      ?'<div class="perf"></div><div class="sect">Ziele</div><section class="rows">'
        +D.goals.map(goalRow).join('')+'</section>':'')
    +debt
    +wealth
    +'<div class="note">Kontodaten bis '+D.through+'. Bar Bezahltes ist nicht enthalten.<br>'
    +'Aktualisiert sich nach jedem CSV-Upload im Claude-Projekt.</div>';
}

function startCountdown(updatedAt){
  var el=document.getElementById('cd');
  if(!el) return;
  var deadline=new Date(updatedAt).getTime()+24*3600*1000;
  function pad(n){return (n<10?'0':'')+n;}
  function tick(){
    var diff=deadline-Date.now();
    if(diff>0){
      var h=Math.floor(diff/36e5), m=Math.floor(diff%36e5/6e4), s=Math.floor(diff%6e4/1e3);
      el.className='cd'+(diff<4*36e5?' over':(diff<12*36e5?' warn':''));
      el.innerHTML='Nächste CSV in <b>'+pad(h)+':'+pad(m)+':'+pad(s)+'</b>';
    }else{
      var over=-diff, oh=Math.floor(over/36e5), om=Math.floor(over%36e5/6e4);
      el.className='cd due';
      el.innerHTML='⏰ CSV fällig · überfällig seit <b>'+oh+' h '+pad(om)+' min</b>';
    }
  }
  tick(); setInterval(tick,1000);
}
fetch('./budget.json?t='+Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(D){ render(D); startCountdown(D.updatedAt); })
  .catch(function(){ document.getElementById('app').innerHTML=
    '<div class="err">Budgets konnten nicht geladen werden.<br>Netz prüfen und neu öffnen.</div>'; });
</script>
</body>
</html>
